name = "liyog-push-notify"
main = "src/index.js"
compatibility_date = "2026-06-01"
[assets]
directory = "./public"
binding = "ASSETS"

# ---- D1 database -------------------------------------------------
[[d1_databases]]
binding = "DB"
database_name = "liyog-notify-db"
database_id = "674b64f2-8848-4456-89c8-27024724fb86"   # from `wrangler d1 create liyog-notify-db`

# ---- Queue (fan-out push sending, same pattern as your email Worker) ----
[[queues.producers]]
binding = "PUSH_QUEUE"
queue = "liyog-push-queue"

[[queues.consumers]]
queue = "liyog-push-queue"
max_batch_size = 20
max_batch_timeout = 5
max_retries = 3

# ---- Cron: poll Blogger feed for new posts every 10 minutes ----
[triggers]
crons = ["*/10 * * * *"]

[vars]
VAPID_SUBJECT = "mailto:you@liyogworld.com.ng"     # contact required by the Web Push spec
BLOG_FEED_URL = "https://liyogworld.com.ng/feeds/posts/default?alt=json&max-results=10"
FEED_PAGE_URL = "https://liyogworld.com.ng/notifications"  # the in-web "What's new" page, see public/notification-feed.js

# ---- Secrets (never put these as plain vars — set with `wrangler secret put <NAME>`) ----
# VAPID_PUBLIC_KEY    -> base64url, also handed to the browser client
# VAPID_PRIVATE_KEY   -> JWK string, generated by scripts/generate-vapid-keys.mjs
# ADMIN_API_KEY       -> shared secret your admin dashboard sends to call /internal/posts/new manually
# FCM_PROJECT_ID      -> set later once the Android app exists
# FCM_SERVICE_ACCOUNT -> set later (JSON service account key, for FCM HTTP v1 OAuth)
